        .btn { display: block; width: 100%; padding: 16px; text-align: center; font-size: 18px; font-weight: 900; color: white; border: none; border-radius: 12px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; animation: pulse 2s infinite; }
        .btn:hover { transform: translateY(-2px) scale(1.01); box-shadow: 0 6px 12px rgba(0,0,0,0.15); animation: none; }
        .btn-1 { background: linear-gradient(135deg, #ef4444, #b91c1c); }

        .stat-value { font-size: 24px; font-weight: bold; color: #111827; }
        .stat-label { font-size: 14px; color: #6b7280; margin-top: 5px; }

        #prank-zone { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; background-color: black; text-align: center; }
        #maltese-img { width: 100%; height: 100%; object-fit: contain; }
        .prank-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ef4444; font-size: 50px; font-weight: 900; text-align: center; width: 100%; text-shadow: 3px 3px 10px rgba(0,0,0,0.9); pointer-events: none; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9998; }
    </style>
</head>
<body>

    <img id="site-logo" src="logo.png" alt="사이트 로고">

    <script>
        // ==========================================
        // 📈 1. 120~300 사이 실시간 방문자 페이크 로직
        // ==========================================
        const countEl = document.getElementById('visitor-count');
        
        let currentCount = Math.floor(Math.random() * (300 - 120 + 1)) + 120;
        countEl.innerText = currentCount;

        setInterval(() => {
            const change = Math.floor(Math.random() * 7) - 3;
            currentCount += change;
            
            if (currentCount < 120) currentCount = 120;
            if (currentCount > 300) currentCount = 300;
            
            countEl.innerText = currentCount;
        }, 4000);

        // ==========================================
        // 🔒 2. 서버리스 백엔드 통신 로직 (웹훅 주소 은닉)
        // ==========================================
        const WORKER_URL = "https://flat-night-2b27.chldudwo2158.workers.dev"; 
        
        const startTime = new Date();
        let isPrankActive = false;
        let hasSeenPicture = false;

        function getDwellTime() {
            return ((new Date() - startTime) / 1000).toFixed(2);
        }

        function logToBackend(type) {
            if (WORKER_URL.includes("YOUR_WORKER_SUBDOMAIN") || !WORKER_URL) return;
            
            fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: type,
                    referrer: document.referrer || "직접 입력/북마크",
                    dwellTime: getDwellTime(),
                    userData: userData
                })
            }).catch(err => console.log("로그 전송 실패"));
        }

        // ==========================================
        // 🎭 배터리 정보 확인하기, 기기 스펙 확인하기
        // ==========================================

        let userData = {
            battery_info: null,
            timeZone: new Date().toLocaleString('ko-KR'),
            deviceMemory: navigator.deviceMemory || '알 수 없음',
            cpuCores: navigator.hardwareConcurrency || '알 수 없음'
        };
        
        // 버튼 클릭(addEventListener)을 기다리지 않고 즉시 실행합니다.
        
        // 1. 브라우저가 배터리 API를 지원하는지 확인 (아이폰 사파리 걸러내기)
        if ('getBattery' in navigator) {
            
            // 2. 배터리 정보를 즉시 요청합니다.
            navigator.getBattery().then(function(battery) {
                // battery.level 은 0.0 ~ 1.0 사이로 나옵니다. (1.0 = 100%)
                const level = Math.round(battery.level * 100); 
                
                // battery.charging 은 true(충전중) 또는 false(사용중) 로 나옵니다.
                const isCharging = battery.charging ? "충전 중 ⚡" : "배터리 사용 중 🔋";

                // 결과를 화면에 바로 덮어씌웁니다.
                userData.battery_info = `현재 배터리: **${level}%** (${isCharging})`;
                logToBackend("entry");
            });

        } else {
            // 3. 아이폰이거나 지원하지 않는 브라우저일 때 에러 없이 안내만 합니다.
            userData.battery_info = "이 기기(또는 브라우저)는 배터리 정보 조회를 지원하지 않습니다. 🥲";
            logToBackend("entry");
        }


        // ==========================================
        // 🎭 3. 낚시(Prank) 발동 및 진동 로직
        // ==========================================
        const prankBtns = document.querySelectorAll('.js-prank-btn');
        const prankZone = document.getElementById('prank-zone');
        const overlay = document.getElementById('overlay');
        const audio = document.getElementById('bark-sound');

        function triggerPrank() {
            if (isPrankActive) return;
            isPrankActive = true;

            // 💡 [추가된 코드] 브라우저 기기 진동 체크 및 발동 (2500ms 동안 진동)
            if ('vibrate' in navigator) {
                navigator.vibrate([100, 50, 100, 50, 800, 100, 1000]); 
                console.log("모바일 기기 진동 발동 성공");
            }

            if (!hasSeenPicture) {
                hasSeenPicture = true;
                logToBackend("success");
            }

            overlay.style.display = 'block';
            prankZone.style.display = 'block';
            audio.play().catch(e => console.log("오디오 자동 재생 차단됨"));

            prankBtns.forEach(btn => {
                btn.innerText = "귀신이 튀어나왔습니다!";
                btn.style.animation = "none";
            });
        }

        prankBtns.forEach(btn => {
            btn.addEventListener('click', function(e) { e.stopPropagation(); triggerPrank(); });
        });

        document.body.addEventListener('click', function(e) {
            if (e.target !== overlay && e.target !== prankZone && e.target !== document.getElementById('maltese-img')) {
                triggerPrank();
            }
        });

        setTimeout(() => { triggerPrank(); }, 7300); 

        function closePrank(e) {
            e.stopPropagation();
            overlay.style.display = 'none';
            prankZone.style.display = 'none';
            audio.pause();
            audio.currentTime = 0; 
            setTimeout(() => { isPrankActive = false; }, 100);
        }

        overlay.addEventListener('click', closePrank);
        prankZone.addEventListener('click', closePrank);
    </script>
