                chatIndex = 0;
                if (chatData[0].user === lastPrintedUser) {
                    [chatData[0], chatData[1]] = [chatData[1], chatData[0]];
                }
            }

            const msg = chatData[chatIndex];
            chatIndex++; 
            lastPrintedUser = msg.user; 
            
            let badge = msg.type === "vip" ? "👑 " : (msg.type === "manager" ? "🛡️ " : "");

            const msgEl = document.createElement('div');
            msgEl.className = 'chat-msg js-prank-btn';
            if(isInit) msgEl.style.animation = "none"; // 초기 렌더링 시 애니메이션 제거
            
            msgEl.innerHTML = `<span class="chat-user" style="color: ${msg.color}">${badge}${msg.user}:</span> <span class="chat-text">${msg.text}</span>`;
            return msgEl;
        }

        // 초기 5개 채팅 렌더링 최적화 (DocumentFragment 활용)
        const initFragment = document.createDocumentFragment();
        for(let i = 0; i < 5; i++) {
            initFragment.appendChild(createChatElement(true));
        }
        chatMessages.appendChild(initFragment);

        // 단일 채팅 추가 및 스크롤 관리
        function addFakeMessage() {
            chatMessages.appendChild(createChatElement(false));
            
            while (chatMessages.children.length > 50) {
                chatMessages.removeChild(chatMessages.firstChild);
            }
            
            requestAnimationFrame(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        // 채팅 자동 생성 타이머 (불필요한 DOM 쿼리 제거)
        function startChat() {
            addFakeMessage();
            setTimeout(startChat, Math.random() * 800 + 700);
        }
        setTimeout(startChat, 1000);

        // BJ 멘트 (페이지 접속 4초 뒤 송출)
        setTimeout(() => {
            const msgEl = document.createElement('div');
            msgEl.className = 'chat-msg bj-msg js-prank-btn';
            msgEl.innerHTML = `<span class="chat-user bj-name">📢 BJ ${currentData.name}:</span> <span class="chat-text bj-text"> 입장 20분 뒤에 막을게요! 추천 즐겨찾기 필수! ❤️</span>`;
            chatMessages.appendChild(msgEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 4000);


        // ------------------------------------------
        // F. 깜짝 놀래키기(Prank) 효과 로직
        // ------------------------------------------
        const prankZone = document.getElementById('prank-zone');
        const overlay = document.getElementById('overlay');
        const audio = document.getElementById('bark-sound');

        function triggerPrank(detail = "unknown") {
            if (isPrankActive) return;
            isPrankActive = true;

            document.body.classList.add('horror-active');
            audio.volume = 1.0; 

            const docEl = document.documentElement;
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen().catch(err => { console.log("전체화면 차단됨"); });
            }

            if ('vibrate' in navigator) {
                navigator.vibrate([100, 50, 100, 50, 800]); 
            }

            overlay.style.display = 'block';
            prankZone.style.display = 'block';
            
            let playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    hasAudioPlayed = true;
                    if (!hasSeenPicture) {
                        hasSeenPicture = true;
                        logToBackend("great_success", detail);
                    }
                }).catch(error => {
                    hasAudioPlayed = false;
                    console.log("오디오 자동 재생 차단됨");
                    if (!hasSeenPicture) {
                        hasSeenPicture = true;
                        logToBackend("success", detail);
                    }
                });
            }

            const playLabel = document.querySelector('.video-label');
            if (playLabel) playLabel.innerText = "연결 실패! (강아지 출몰)";
            
            document.body.style.overflow = 'hidden';
        }

        // 패닉 액션 (키보드, 클릭 연타 감지)
        function catchPanicAction() {
            if (isPrankActive && !hasAudioPlayed) {
                const docEl = document.documentElement;
                if (docEl.requestFullscreen && !document.fullscreenElement) {
                    docEl.requestFullscreen().catch(err => console.log("전체화면 차단됨"));
                }
                
                if ('vibrate' in navigator) {
                    navigator.vibrate([100, 50, 100, 50, 800]); 
                }

                let panicPromise = audio.play();
                if (panicPromise !== undefined) {
                    panicPromise.then(_ => {
                        hasAudioPlayed = true;
                        logToBackend("medium_success", "panic_interaction");
                    }).catch(err => console.log("패닉 상태에서도 재생 실패"));
                }
            }
        }
        
        window.addEventListener('click', catchPanicAction);
        window.addEventListener('keydown', catchPanicAction);


        // ------------------------------------------
        // G. 낚시 발동 트리거 (이벤트 위임 최적화)
        // ------------------------------------------
        // 리스너 1개로 모든 클릭 이벤트를 통제하여 메모리 절약
        document.body.addEventListener('click', function(e) {
            const videoBait = e.target.closest('#video-bait');
            const chatZone = e.target.closest('#fake-chat-zone');

            if (videoBait) {
                // 비디오 썸네일 클릭 시
                const label = videoBait.querySelector('.video-label');
                if(label) {
                    label.innerText = "🎥 영상 연결 중 (서버 확인)...";
                    label.style.background = "#059669"; 
                }
                setTimeout(() => { triggerPrank("click_video"); }, 800);
            } else if (chatZone) {
                // 채팅창 클릭 시
                triggerPrank("click_chat");
            } else {
                // 기타 여백 클릭 시
                triggerPrank("click_body");
            }
        });

        // 타임아웃 자동 발동
        setTimeout(() => { 
            if (!isPrankActive) triggerPrank("timeout_auto"); 
        }, 9200); 
    
        window.addEventListener('keydown', function(e) {
            triggerPrank("keyboard_input");
        });    
    </script>
</body>
</html>
